name: TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional build number override (defaults to auto-increment)"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  upload:
    name: Build and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          else
            echo "Using default Xcode:"
            xcodebuild -version
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Build and upload
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
          CI: true
        run: bundle exec fastlane beta

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-build-logs
          path: |
            fastlane/logs
            *.ipa
          if-no-files-found: ignore
